<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MalvsStudy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Menu Superior -->
    <nav class="menu">
      <div class="menu-brand">MalvsStudy</div>
      <ul class="menu-list">
        <li class="menu-item active" data-modulo="dashboard" onclick="switchModule('dashboard')">Dashboard</li>
        <li class="menu-item" data-modulo="registros" onclick="switchModule('registros')">Registros</li>
        <li class="menu-item" data-modulo="revisoes" onclick="switchModule('revisoes')">Revisões</li>
      </ul>
    </nav>

    <!-- Conteúdo dos Módulos -->
    <div class="module-container">
      <!-- Módulo Dashboard -->
      <div id="module-dashboard" class="module active">
        <div class="module-header">
          <h2>Dashboard de Desempenho</h2>
        </div>
        <div class="dashboard-filters" style="display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap;">
          <div class="filter-dropdown-inline">
            <select id="filtroDashboardCurso" onchange="atualizarDashboard()">
              <option value="">Todos os Cursos</option>
            </select>
          </div>
          <div class="filter-dropdown-inline">
            <select id="filtroDashboardUnidade" onchange="atualizarDashboard()">
              <option value="">Todas as Unidades</option>
            </select>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
          <div class="card">
            <h3 style="margin-top:0; color:var(--success-color);">🏆 Melhores Desempenhos</h3>
            <div id="dashboardMelhores"></div>
          </div>
          <div class="card">
            <h3 style="margin-top:0; color:var(--danger-color);">⚠️ Piores Desempenhos</h3>
            <div id="dashboardPiores"></div>
          </div>
        </div>
      </div>

      <!-- Módulo Registros -->
      <div id="module-registros" class="module">
        <div class="module-header">
          <h2>Registros de Estudo</h2>
          <button onclick="abrirModalNovoEstudo()" class="btn-new-order-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Novo Estudo
          </button>
        </div>
        <div id="registrosContainer"></div>
      </div>

      <!-- Módulo Revisões -->
      <div id="module-revisoes" class="module">
        <div class="module-header">
          <h2>Revisões Necessárias</h2>
        </div>
        <div id="revisoesContainer"></div>
      </div>
    </div>
  </div>

  <!-- Modal de confirmação de exercícios -->
  <div class="modal-overlay" id="modalExercicios" style="display:none;">
    <div class="modal-content" style="max-width:450px;">
      <div class="modal-header">
        <h3 class="modal-title">Exercícios realizados?</h3>
        <button class="close-modal" onclick="fecharModalExercicios()">✕</button>
      </div>
      <p style="margin-bottom:1.5rem;">Você realizou exercícios sobre este conteúdo?</p>
      <div class="modal-actions" style="justify-content:center;">
        <button class="save" onclick="respostaExercicios(true)">Sim</button>
        <button class="secondary" onclick="respostaExercicios(false)">Não</button>
      </div>
    </div>
  </div>

  <!-- Modal de edição (reutilizado) -->
  <div class="modal-overlay" id="formModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="formModalTitle">Novo Estudo</h3>
        <button class="close-modal" onclick="closeFormModal()">✕</button>
      </div>
      <div class="tabs-container" id="formTabs">
        <div class="tabs-nav">
          <button class="tab-btn active" data-tab="tabGeral" onclick="switchFormTab('tabGeral', this)">Geral</button>
          <button class="tab-btn" data-tab="tabQuestoes" onclick="switchFormTab('tabQuestoes', this)" id="tabBtnQuestoes">Questões</button>
        </div>
        <div id="tabGeral" class="tab-content active">
          <div class="form-grid">
            <div class="form-group"><label>Curso *</label><input type="text" id="f_curso" placeholder="Ex: Matemática" required></div>
            <div class="form-group"><label>Unidade</label><input type="text" id="f_unidade" placeholder="Ex: Equações"></div>
            <div class="form-group"><label>Conteúdo</label><input type="text" id="f_conteudo" placeholder="Ex: Funções"></div>
            <div class="form-group"><label>Data do Estudo</label><input type="date" id="f_dataEstudo"></div>
          </div>
        </div>
        <div id="tabQuestoes" class="tab-content">
          <div class="form-grid">
            <div class="form-group"><label>Quantidade de Questões</label><input type="number" id="f_quantidade" min="0" value="0"></div>
            <div class="form-group"><label>Erros</label><input type="number" id="f_erros" min="0" value="0"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="save" onclick="salvarEstudo()">Salvar</button>
        <button type="button" class="btn-cancel" onclick="closeFormModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('load', function() {
      inicializarApp();
    });
  </script>
</body>
</html>
