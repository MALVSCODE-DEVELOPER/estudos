<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MalvsStudy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- SIDEBAR ESQUERDA -->
    <aside class="sidebar">
      <div class="sidebar-brand">MalvsStudy</div>
      <nav class="sidebar-nav">
        <ul>
          <li class="sidebar-item active" data-modulo="dashboard" onclick="switchModule('dashboard')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M14 14h7v7h-7z"/><path d="M3 14h7v7H3z"/>
            </svg>
            Dashboard
          </li>
          <li class="sidebar-item" data-modulo="registros" onclick="switchModule('registros')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            Registros
          </li>
          <li class="sidebar-item" data-modulo="revisoes" onclick="switchModule('revisoes')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Revisões
          </li>
        </ul>
      </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
      <!-- DASHBOARD -->
      <div id="module-dashboard" class="module active">
        <div class="module-header"><h2>Dashboard de Desempenho</h2></div>
        <div class="filter-bar">
          <select id="filtroDashboardCurso" onchange="atualizarDashboard()">
            <option value="">Todos os Cursos</option>
          </select>
          <select id="filtroDashboardUnidade" onchange="atualizarDashboard()">
            <option value="">Todas as Unidades</option>
          </select>
        </div>
        <div class="dashboard-cards">
          <div class="card">
            <h3>🏆 Melhores Desempenhos</h3>
            <div id="dashboardMelhores"><p style="color:#6c757d;">Nenhum dado disponível.</p></div>
          </div>
          <div class="card">
            <h3>⚠️ Piores Desempenhos</h3>
            <div id="dashboardPiores"><p style="color:#6c757d;">Nenhum dado disponível.</p></div>
          </div>
        </div>
      </div>

      <!-- REGISTROS -->
      <div id="module-registros" class="module">
        <div class="module-header">
          <h2>Registros de Estudo</h2>
          <button onclick="abrirModalNovoEstudo()" class="btn-new">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Novo Estudo
          </button>
        </div>
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchRegistros" placeholder="Buscar por curso, unidade ou conteúdo..." oninput="renderizarRegistros()">
        </div>
        <div id="registrosContainer"></div>
      </div>

      <!-- REVISÕES -->
      <div id="module-revisoes" class="module">
        <div class="module-header"><h2>Revisões Necessárias</h2></div>
        <div id="revisoesContainer"></div>
      </div>
    </main>
  </div>

  <!-- MODAL: pergunta se fez exercícios -->
  <div class="modal-overlay" id="modalExercicios" style="display:none;">
    <div class="modal-content" style="max-width:420px;text-align:center;">
      <div class="modal-header" style="border-bottom:none;">
        <span class="modal-title">Novo Estudo</span>
        <button class="close-modal" onclick="fecharModalExercicios()">&times;</button>
      </div>
      <p style="margin-bottom:1.5rem;color:var(--text-secondary);">Você realizou exercícios sobre este conteúdo?</p>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn-secondary" onclick="respostaExercicios(false)">Não</button>
        <button class="btn-primary" onclick="respostaExercicios(true)">Sim</button>
      </div>
    </div>
  </div>

  <!-- MODAL: formulário de estudo / revisão -->
  <div class="modal-overlay" id="formModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="formModalTitle">Novo Estudo</span>
        <button class="close-modal" onclick="closeFormModal()">&times;</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="tabGeral" onclick="switchFormTab('tabGeral', this)">Geral</button>
        <button class="tab-btn" id="tabBtnQuestoes" data-tab="tabQuestoes" onclick="switchFormTab('tabQuestoes', this)">Questões</button>
      </div>

      <div class="tab-content active" id="tabGeral">
        <div class="form-grid">
          <div class="form-group">
            <label>Curso *</label>
            <input id="f_curso" type="text" placeholder="Ex: Matemática">
          </div>
          <div class="form-group">
            <label>Unidade</label>
            <input id="f_unidade" type="text" placeholder="Ex: Unidade 3">
          </div>
          <div class="form-group">
            <label>Conteúdo</label>
            <input id="f_conteudo" type="text" placeholder="Ex: Funções quadráticas">
          </div>
          <div class="form-group">
            <label>Data do Estudo</label>
            <input id="f_dataEstudo" type="date">
          </div>
        </div>
      </div>

      <div class="tab-content" id="tabQuestoes">
        <div class="form-grid">
          <div class="form-group">
            <label>Quantidade de Questões</label>
            <input id="f_quantidade" type="number" min="0" value="0">
          </div>
          <div class="form-group">
            <label>Erros</label>
            <input id="f_erros" type="number" min="0" value="0">
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeFormModal()">Cancelar</button>
        <button class="btn-primary" onclick="salvarEstudo()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>window.addEventListener('load', inicializarApp);</script>
</body>
</html>
